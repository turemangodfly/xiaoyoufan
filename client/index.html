<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>校友范 - 校园送餐</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

<!-- ==================== 登录页 ==================== -->
<div id="page-auth" class="page"><div class="auth-wrap">
  <div class="auth-brand"><div class="brand-icon"><span class="logo-text">校友范</span></div><p class="brand-sub">校园专属送餐平台</p></div>
  <div class="auth-tabs"><span class="atab active" onclick="switchAuth(1)">登录</span><span class="atab" onclick="switchAuth(0)">注册</span></div>
  <form id="f-login" class="aform active" onsubmit="handleLogin(event)">
    <div class="ai"><i>👤</i><input type="text" placeholder="用户名" required></div>
    <div class="ai"><i>🔒</i><input type="password" placeholder="密码" required></div>
    <button class="btn-primary">登 录</button>
    <p class="auth-hint" style="margin-top:12px;text-align:center;color:#999;font-size:12px">注册账号: xiaoyoufan / 密码: 123456</p>
  </form>
  <form id="f-reg" class="aform" onsubmit="handleRegister(event)">
    <div class="ai"><i>👤</i><input type="text" placeholder="用户名" required></div>
    <div class="ai"><i>📱</i><input type="tel" placeholder="手机号"></div>
    <div class="ai"><i>🔒</i><input type="password" placeholder="密码" required></div>
    <div class="ai"><i>🔒</i><input type="password" placeholder="确认密码" required></div>
    <button class="btn-primary">注 册</button>
  </form>
</div></div>

<!-- ==================== 首页 ==================== -->
<div id="page-home" class="page">
  <div class="top-bar"><div class="loc"><span>📍</span> 校园南区 <span style="font-size:10px">▾</span></div><div class="top-actions"><span onclick="showPage('search')">🔍</span></div></div>
  <div class="search-box" onclick="showPage('search')"><span>🔍</span> 搜索餐厅或美食...</div>
  <div class="cat-scroll" id="cat-bar"></div>
  <div class="feed" id="feed"></div>
  <nav class="btm-nav">
    <span class="bnav active" onclick="showPage('home')"><span class="bicon">🏠</span><span class="blabel">首页</span></span>
    <span class="bnav" onclick="showPage('cart-page')"><span class="bicon">🛒</span><span class="blabel">购物车</span><span class="badge" id="badge" style="display:none">0</span></span>
    <span class="bnav" onclick="showPage('orders-page')"><span class="bicon">📋</span><span class="blabel">订单</span></span>
    <span class="bnav" onclick="showPage('profile-page')"><span class="bicon">👤</span><span class="blabel">我的</span></span>
  </nav>
</div>

<!-- ==================== 商家详情 ==================== -->
<div id="page-rest" class="page">
  <div class="rest-header"><button class="back" onclick="showPage('home')">‹</button><div><h2 id="rname"></h2><div class="rmeta" id="rmeta"></div></div></div>
  <div class="menu-wrap" id="menu-wrap"></div>
  <div class="float-cart" id="float-cart" style="display:none">
    <div class="fc-left" onclick="showCartSummary()"><span class="fc-icon">🛒</span><span class="fc-badge" id="fc-num">0</span><span class="fc-price" id="fc-price">¥0</span><span class="fc-delivery">配送费¥<span id="fc-df">0</span></span></div>
    <button class="fc-btn" id="fc-btn" onclick="goCheckout()">去结算</button>
  </div>
</div>

<!-- ==================== 购物车 ==================== -->
<div id="page-cart-page" class="page">
  <div class="ph"><h3>购物车</h3></div>
  <div class="cart-body" id="cart-body"></div>
</div>

<!-- ==================== 订单 ==================== -->
<div id="page-orders-page" class="page">
  <div class="ph"><h3>我的订单</h3></div>
  <div class="orders-body" id="orders-body"></div>
</div>

<!-- ==================== 个人中心 ==================== -->
<div id="page-profile-page" class="page">
  <div class="pf-header"><div class="pf-avatar"><span id="pf-avatar-icon">👤</span></div><div class="pf-info"><h3 id="pf-name"></h3><p id="pf-phone"></p></div></div>
  <div class="pf-menu">
    <div class="pf-item" onclick="showAddressEdit()"><span class="pficon">📍</span><span>收货地址</span><span class="pfarr">›</span></div>
    <div class="pf-item" onclick="showPage('orders-page')"><span class="pficon">📋</span><span>我的订单</span><span class="pfarr">›</span></div>
    <div class="pf-item" onclick="handleLogout()"><span class="pficon" style="color:#e74c3c">🚪</span><span style="color:#e74c3c">退出登录</span><span class="pfarr">›</span></div>
  </div>
</div>

<!-- ==================== 搜索 ==================== -->
<div id="page-search" class="page">
  <div class="search-top"><button class="back" onclick="showPage('home')">‹</button><div class="si"><input type="text" id="s-input" placeholder="搜索餐厅或美食..." oninput="doSearch(this.value)"></div></div>
  <div class="sr" id="sr"><div class="empty">🔍<p>搜索你喜欢的餐厅和美食</p></div></div>
</div>

</div><!-- app -->

<!-- 弹窗遮罩 -->
<div id="modal" class="modal" style="display:none" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()" id="modal-body"></div></div>

<script src="js/app.js"></script>
</body>
</html>
